version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8028:8028"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5198:5198"
    depends_on:
      - backend
