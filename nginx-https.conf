# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name astrorattan.com www.astrorattan.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name astrorattan.com www.astrorattan.com;

    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/astrorattan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/astrorattan.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # L3: X-XSS-Protection removed (deprecated; CSP replaces it)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # H3: Permissions-Policy tightened (site does not use geolocation)
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
    # H3: Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.puter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.puter.com wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    root /var/www/astrorattan;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8028;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hashed JS/CSS/image assets — long cache (C5); note: no /dist subdir in this root
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images directory
    location ^~ /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Well-known root files — serve as static; real 404 if missing
    location = /sitemap.xml       { try_files $uri =404; }
    location = /robots.txt        { try_files $uri =404; }
    location = /llms.txt          { try_files $uri =404; }
    location = /llms-full.txt     { try_files $uri =404; }
    location = /favicon.ico       { try_files $uri =404; }
    location = /favicon.svg       { try_files $uri =404; }
    location = /favicon-16x16.png { try_files $uri =404; }
    location = /favicon-32x32.png { try_files $uri =404; }
    location = /logo.png          { try_files $uri =404; }
    location = /og-image.png      { try_files $uri =404; }
    location ^~ /.well-known/     { try_files $uri =404; }

    # B1/C1: Known SPA routes — serve index.html with short cache (C5)
    # NOTE: nginx `add_header` does NOT inherit when a location defines its own.
    # All security headers must be repeated inside each location to keep CSP/HSTS/etc.
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.puter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.puter.com wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    }

    location ~ ^/(about|dashboard|astrologer|kundli|panchang|horoscope|login|register|numerology|lal-kitab|vastu|admin|feedback|blog)(/.*)?$ {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.puter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.puter.com wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    }

    location ~ ^/client/[^/]+(/.*)?$ {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.puter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.puter.com wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    }

    # C1: Final catch-all — real 404 for unknown paths (no soft-404)
    location / {
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
}
