name: Astro Rattan CI + Deploy

on:
  push:
    branches: [main, production, staging]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        run: pip install -r requirements.txt pytest
      - name: Run backend tests
        run: python -m pytest tests/ --ignore=tests/test_blueprint_contract.py --ignore=tests/test_kundli_routes.py -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ''

  # Production deploy — ONLY on production branch push
  deploy-hostinger:
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 145.223.21.39
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /app/astro_rattan
            git pull origin production
            docker build -t astrorattan-backend .
            docker stop astrorattan-backend || true
            docker rm astrorattan-backend || true
            docker run -d --name astrorattan-backend --restart unless-stopped --network host --env-file .env -e PORT=8028 astrorattan-backend
            cd frontend && npm ci && VITE_API_URL= npm run build
            systemctl reload nginx
            echo "DEPLOYED TO PRODUCTION: $(date)"

  # Staging deploy — ONLY on staging branch push
  deploy-staging:
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS (Staging)
        uses: appleboy/ssh-action@v1
        with:
          host: 145.223.21.39
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /app/astro_rattan
            git fetch origin
            git checkout staging
            git reset --hard origin/staging
            docker build -t astrorattan-staging .
            docker stop astrorattan-staging || true
            docker rm astrorattan-staging || true
            docker run -d --name astrorattan-staging --restart unless-stopped --network host --env-file .env -e PORT=8029 astrorattan-staging
            cd frontend && npm ci && VITE_API_URL= npm run build -- --outDir dist-staging
            systemctl reload nginx
            echo "DEPLOYED TO STAGING: $(date)"
