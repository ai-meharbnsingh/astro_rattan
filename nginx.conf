server {
    listen 80;
    server_name astrorattan.com www.astrorattan.com;

    # Security & Browser Compatibility Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # L3: X-XSS-Protection removed (deprecated; CSP replaces it)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # H3: Permissions-Policy tightened (site does not use geolocation)
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
    # H3: Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.puter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.puter.com https://nominatim.openstreetmap.org wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # API endpoints — proxy to backend with full header support
    location /api/ {
        proxy_pass http://localhost:8028;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://localhost:8028;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Static assets — proxy to backend
    location /static/ {
        proxy_pass http://localhost:8028;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Hashed JS/CSS/image bundles — long cache (C5)
    location ~ ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root /var/www/astrorattan/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        error_page 404 =404 $request_filename;
    }

    # Images directory
    location ^~ /images/ {
        root /var/www/astrorattan/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Well-known root files — serve as static; real 404 if missing
    location = /sitemap.xml       { root /var/www/astrorattan/dist; }
    location = /robots.txt        { root /var/www/astrorattan/dist; }
    location = /llms.txt          { root /var/www/astrorattan/dist; }
    location = /llms-full.txt     { root /var/www/astrorattan/dist; }
    location = /favicon.ico       { root /var/www/astrorattan/dist; }
    location = /favicon.svg       { root /var/www/astrorattan/dist; }
    location = /favicon-16x16.png { root /var/www/astrorattan/dist; }
    location = /favicon-32x32.png { root /var/www/astrorattan/dist; }
    location = /logo.png          { root /var/www/astrorattan/dist; }
    location = /og-image.png      { root /var/www/astrorattan/dist; }
    location ^~ /.well-known/     { root /var/www/astrorattan/dist; }

    # B1/C1: Known SPA routes — serve index.html with short cache (C5)
    location = / {
        root /var/www/astrorattan/dist;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location ~ ^/(about|dashboard|astrologer|kundli|panchang|horoscope|login|register|numerology|lal-kitab|vastu|admin|feedback|blog)(/.*)?$ {
        root /var/www/astrorattan/dist;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location ~ ^/client/[^/]+(/.*)?$ {
        root /var/www/astrorattan/dist;
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # C1: Final catch-all — real 404 for unknown paths (no soft-404)
    location / {
        root /var/www/astrorattan/dist;
        try_files $uri =404;
    }
}

