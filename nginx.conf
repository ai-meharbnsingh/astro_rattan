server {
    listen 80;
    server_name astrorattan.com www.astrorattan.com;

    location /api/ {
        proxy_pass http://localhost:8028;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://localhost:8028;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /static/ {
        proxy_pass http://localhost:8028;
    }

    location / {
        root /var/www/astrorattan/dist;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name testing.astrorattan.com;

    location /api/ {
        proxy_pass http://localhost:8029;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://localhost:8029;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /static/ {
        proxy_pass http://localhost:8029;
    }

    location / {
        root /app/astro_rattan/frontend/dist-staging;
        try_files $uri $uri/ /index.html;
    }
}
