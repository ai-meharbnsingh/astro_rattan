server {
    listen 80;
    server_name astrorattan.com www.astrorattan.com;

    # Security & Browser Compatibility Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # API endpoints — proxy to backend with full header support
    location /api/ {
        proxy_pass http://localhost:8028;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://localhost:8028;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Static assets — serve with proper cache headers
    location /static/ {
        proxy_pass http://localhost:8028;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets (JS/CSS/images) — must come BEFORE catch-all /
    location ~ ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root /var/www/astrorattan/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Return 404 for missing files, NOT index.html
        error_page 404 =404 $request_filename;
    }

    # Frontend SPA
    location / {
        root /var/www/astrorattan/dist;
        try_files $uri @fallback;

        # HTML files — no cache for browser compatibility
        location ~ \.html?$ {
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "text/html; charset=UTF-8";
        }
    }

    # SPA fallback to index.html (only for non-existent files)
    location @fallback {
        root /var/www/astrorattan/dist;
        rewrite ^.*$ /index.html break;
    }
}

