<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Observatory — Cosmic Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --void: #000000;
            --gold: #d4af37;
            --gold-bright: #ffd700;
            --amber: #ffaa33;
        }

        body {
            background: var(--void);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========================================
           SCATTERED COSMIC SYMBOLS - PURE GOLD
           ======================================== */
        .cosmic-symbols-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: #000000;
        }

        .cosmic-symbol {
            position: absolute;
            font-family: 'Times New Roman', serif;
            color: #d4af37;
            text-shadow: 
                0 0 10px rgba(212, 175, 55, 0.5),
                0 0 20px rgba(212, 175, 55, 0.3),
                0 0 30px rgba(212, 175, 55, 0.1);
            animation: symbolFloat 8s ease-in-out infinite, symbolPulse 5s ease-in-out infinite;
            user-select: none;
            -webkit-text-stroke: 0.5px rgba(212, 175, 55, 0.3);
            will-change: transform, opacity;
        }

        @keyframes symbolFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes symbolPulse {
            0%, 100% { opacity: inherit; filter: brightness(1); }
            50% { opacity: calc(inherit + 0.1); filter: brightness(1.2); }
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.02;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 5%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Stars - few scattered dots */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 0 4px #d4af37, 0 0 8px rgba(212, 175, 55, 0.5);
            animation: starTwinkle 3s ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Cinzel Decorative', serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        /* Main Content */
        .section {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 40px;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .hero-shloka {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--amber);
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 170, 51, 0.3);
        }

        .hero-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(36px, 8vw, 80px);
            line-height: 0.95;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.15);
        }

        .hero-title span {
            display: block;
            font-size: 0.35em;
            letter-spacing: 12px;
            color: var(--gold);
            margin-top: 10px;
        }

        .hero-equation {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--gold);
            letter-spacing: 1px;
            padding: 10px 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0,0,0,0.6);
            margin-bottom: 25px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        .hero-desc {
            font-size: 14px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .hero-cta {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            background: var(--gold-bright);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 14px 28px;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .scroll-line {
            width: 1px;
            height: 50px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .hero-cta { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; }
            .cosmic-symbol { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Scattered Cosmic Symbols -->
    <div class="cosmic-symbols-container" id="symbolsContainer"></div>
    
    <!-- Stars -->
    <div class="stars" id="starsContainer"></div>
    
    <!-- Overlays -->
    <div class="grain"></div>
    <div class="vignette"></div>

    <nav>
        <div class="nav-logo">⚜ THE OBSERVATORY</div>
    </nav>

    <section class="section">
        <div class="hero-content">
            <div class="hero-shloka">ज्योतिषम् अयम् ब्रह्म — Astrology is the Supreme</div>
            <h1 class="hero-title">
                THE OBSERVATORY
                <span>Of Destiny</span>
            </h1>
            <div class="hero-equation">L = Asc + (S × 30°) + (N × 3°20')</div>
            <p class="hero-desc">
                The universe does not hide its secrets. It writes them in light,
                across twelve houses, waiting for those who know how to read.
            </p>
            <div class="hero-cta">
                <button class="btn-primary">Get Free Kundli</button>
                <button class="btn-secondary">Consult Expert</button>
            </div>
            <div class="scroll-line"></div>
        </div>
    </section>

    <script>
        // Real cosmic symbols
        const cosmicGlyphs = [
            '♈', '♉', '♊', '♋', '♌', '♍',
            '♎', '♏', '♐', '♑', '♒', '♓',
            '☉', '☽', '☿', '♀', '♂', '♃',
            '♄', '♅', '♆', '☊', '☋',
            '✦', '✧', '✪', '✯', '✶', '✵'
        ];

        // Scatter symbols across entire screen
        function scatterSymbols() {
            const container = document.getElementById('symbolsContainer');
            const symbolCount = 45; // Number of symbols
            
            for (let i = 0; i < symbolCount; i++) {
                const symbol = document.createElement('div');
                symbol.className = 'cosmic-symbol';
                symbol.textContent = cosmicGlyphs[i % cosmicGlyphs.length];
                
                // Random position across ENTIRE screen
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                
                // Random size
                const size = 22 + Math.random() * 26;
                
                // Random animation delay
                const delay = Math.random() * 8;
                const duration = 6 + Math.random() * 4;
                
                // Random rotation
                const rotate = Math.random() * 360;
                
                symbol.style.left = `${left}%`;
                symbol.style.top = `${top}%`;
                symbol.style.fontSize = `${size}px`;
                symbol.style.animationDelay = `${delay}s`;
                symbol.style.animationDuration = `${duration}s`;
                symbol.style.setProperty('--rotate', `${rotate}deg`);
                symbol.style.transform = `rotate(${rotate}deg)`;
                
                // Keep center area relatively clear for text
                const centerX = left > 35 && left < 65;
                const centerY = top > 30 && top < 70;
                
                if (centerX && centerY) {
                    // In center area - make more transparent
                    symbol.style.opacity = '0.1';
                    symbol.style.zIndex = '0';
                } else {
                    // Outside center - normal visibility
                    symbol.style.opacity = '0.3';
                    symbol.style.zIndex = '1';
                }
                
                container.appendChild(symbol);
            }
        }

        // Scatter stars
        function scatterStars() {
            const container = document.getElementById('starsContainer');
            const starCount = 50;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 3}s`;
                
                container.appendChild(star);
            }
        }

        // Initialize
        scatterSymbols();
        scatterStars();

        // Mouse parallax effect
        document.addEventListener('mousemove', (e) => {
            const symbols = document.querySelectorAll('.cosmic-symbol');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            symbols.forEach((symbol, i) => {
                const speed = 0.2 + (i % 5) * 0.15;
                const currentRotate = symbol.style.getPropertyValue('--rotate') || '0deg';
                symbol.style.transform = `translate(${x * speed}px, ${y * speed}px) rotate(${currentRotate})`;
            });
        });
    </script>

</body>
</html>
